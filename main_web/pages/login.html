<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Heropesa Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* Material Design Google Color Accents */
.color-blue { color: #1a73e8 !important; }
.color-red { color: #ea4335 !important; }
.color-yellow { color: #fbbc05 !important; }
.color-green { color: #34a853 !important; }
.bg-blue-light { background-color: rgba(26, 115, 232, 0.08) !important; border-color: rgba(26, 115, 232, 0.3) !important; color: #1a73e8 !important; }
.bg-red-light { background-color: rgba(234, 67, 53, 0.08) !important; border-color: rgba(234, 67, 53, 0.3) !important; color: #ea4335 !important; }
.bg-yellow-light { background-color: rgba(251, 188, 5, 0.08) !important; border-color: rgba(251, 188, 5, 0.3) !important; color: #fbbc05 !important; }
.bg-green-light { background-color: rgba(52, 168, 83, 0.08) !important; border-color: rgba(52, 168, 83, 0.3) !important; color: #34a853 !important; }

:root {
  --primary: #1a73e8;
  --primary-hover: #1557b0;
  --bg-body: #ffffff;
  --bg-light: #f8f9fa;
  --text-main: #202124;
  --text-secondary: #5f6368;
  --text-muted: #70757a;
  --border: #dadce0;
  --border-focus: #1a73e8;
  --radius: 4px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg-light);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-container {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-section {
  text-align: center;
  margin-bottom: 32px;
}

.logo-section a {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-main);
  text-decoration: none;
}

.logo-accent {
  color: var(--text-muted);
}

.form-header {
  margin-bottom: 24px;
  text-align: center;
}

.form-header h2 {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.form-header p {
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.form-group {
  margin-bottom: 20px;
  position: relative;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  margin-bottom: 8px;
  color: var(--text-secondary);
}

.input-wrapper {
  position: relative;
}

.input-wrapper i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 1rem;
}

.form-input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.95rem;
  transition: all var(--transition);
  outline: none;
}

.form-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(10, 10, 10, 0.05);
}

.password-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  cursor: pointer;
  transition: color var(--transition);
}

.password-toggle:hover {
  color: var(--text-main);
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  font-size: 0.85rem;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.forgot-link {
  color: var(--text-secondary);
  text-decoration: none;
  transition: color var(--transition);
}

.forgot-link:hover {
  color: var(--text-main);
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-weight: 500;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.submit-btn:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
}

.signup-prompt {
  text-align: center;
  margin-top: 24px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.signup-link {
  color: var(--text-main);
  font-weight: 600;
  text-decoration: none;
}

.signup-link:hover {
  text-decoration: underline;
}

/* Back Link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-decoration: none;
  margin-bottom: 20px;
  transition: color var(--transition);
}

.back-link:hover {
  color: var(--text-main);
}
</style>
</head>
<body>

<div>
  <a href="/index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  
  <div class="login-container">
    <div class="logo-section">
      <a href="/index.html">Hero<span class="logo-accent">pesa</span></a>
    </div>
    
    <div class="form-header">
      <h2>Welcome Back</h2>
      <p>Log in to access your business control panel</p>
    </div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Work Email</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope"></i>
          <input class="form-input" type="email" id="email" required placeholder="name@company.com">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock color-blue"></i>
          <input class="form-input" type="password" id="password" required placeholder="••••••••">
          <i class="fa-regular fa-eye password-toggle" id="passwordToggle" onclick="togglePasswordVisibility()"></i>
        </div>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox"> Remember this device
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">
        <span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>
    
    <div class="signup-prompt">
      Don't have an account? <a href="/pages/signup.html" class="signup-link">Start free trial</a>
    </div>
  </div>
</div>

<script>
function togglePasswordVisibility() {
  const passwordInput = document.getElementById('password');
  const toggleIcon = document.getElementById('passwordToggle');
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.classList.remove('fa-eye');
    toggleIcon.classList.add('fa-eye-slash');
  } else {
    passwordInput.type = 'password';
    toggleIcon.classList.remove('fa-eye-slash');
    toggleIcon.classList.add('fa-eye');
  }
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const submitBtn = document.getElementById('submitBtn');
  
  submitBtn.disabled = true;
  submitBtn.style.opacity = '0.7';
  submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Logging in...';
  
  setTimeout(() => {
    alert('Mock login successful for user: ' + email);
    window.location.href = '/index.html';
  }, 1200);
}
</script>

</body>
</html>
