              <button class="btn btn-primary" id="saveTaskBtn">${isEdit ? 'Update' : 'Create'}</button>
            </div>
          `;
            modal.classList.add('open');
            document.getElementById('saveTaskBtn').addEventListener('click', function() {
                const payload = {
                    title: document.getElementById('fTaskTitle').value.trim(),
                    priority: document.getElementById('fTaskPriority').value,
                    status: document.getElementById('fTaskStatus').value,
                    dueDate: document.getElementById('fTaskDue').value || null,
                    assignedTo: document.getElementById('fTaskAssigned').value.trim() || 'John Doe',
                };
                if (!payload.title) { toast('Title is required', 'error'); return; }
                if (isEdit) {
                    store.update('tasks', d.id, payload);
                    toast('Task updated', 'success');
                } else {
                    payload.id = uid();
                    payload.createdAt = new Date().toISOString();
                    store.add('tasks', payload);
                    toast('Task created', 'success');
                }
                closeModal();
                navigate('tasks');
            });
        };

        window.editTask = function(id) {
            const t = store.find('tasks', id);
            if (t) openTaskForm(t);
        };
        window.deleteTask = function(id) {
            if (!confirm('Delete this task?')) return;
            store.remove('tasks', id);
            toast('Task deleted', 'success');
            navigate('tasks');
        };
        window.completeTask = function(id) {
            store.update('tasks', id, { status: 'done' });
            toast('Task completed! 🎉', 'success');
            navigate('tasks');
        };

        // ===== MODAL =====
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
        }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ===== THEME =====
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            store.data.settings.theme = next;
            store.save();
            toast(`Switched to ${next} mode`, 'info');
        }
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // ===== SIDEBAR TOGGLE =====
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // ===== NAVIGATION =====
        document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page) navigate(page);
                if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
            });
        });

        // ===== GLOBAL SEARCH =====
        document.getElementById('globalSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const q = this.value.trim();
                if (!q) return;
                // Search across all collections
                const results = [];
                store.get('customers').forEach(c => { if (c.name.toLowerCase().includes(q)) results.push({ label: c
                            .name, type: 'Customer', id: c.id, page: 'customers' }); });
                store.get('contacts').forEach(c => { const n = `${c.firstName} ${c.lastName}`; if (n.toLowerCase()
                        .includes(q)) results.push({ label: n, type: 'Contact', id: c.id, page: 'contacts' }); });
                store.get('leads').forEach(c => { const n = `${c.firstName} ${c.lastName}`; if (n.toLowerCase()
                        .includes(q)) results.push({ label: n, type: 'Lead', id: c.id, page: 'leads' }); });
                store.get('opportunities').forEach(c => { if (c.name.toLowerCase().includes(q)) results.push({ label: c
                            .name, type: 'Opportunity', id: c.id, page: 'opportunities' }); });
                if (results.length === 0) { toast('No results found', 'warning'); return; }
                toast(`Found ${results.length} result${results.length>1?'s':''}`, 'info');
                // Navigate to first result's page
                navigate(results[0].page);
            }
        });

        // ===== COMMAND PALETTE =====
        document.getElementById('cmdPaletteBtn').addEventListener('click', function() {
            document.getElementById('cmdPalette').classList.toggle('open');
            if (document.getElementById('cmdPalette').classList.contains('open')) {
                document.getElementById('cmdInput').focus();
            }
        });
        document.getElementById('cmdInput').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            const results = document.getElementById('cmdResults');
            const commands = [
                { label: 'Dashboard', shortcut: 'G D', page: 'dashboard' },
                { label: 'Customers', shortcut: 'G C', page: 'customers' },
                { label: 'Contacts', shortcut: 'G T', page: 'contacts' },
                { label: 'Leads', shortcut: 'G L', page: 'leads' },
                { label: 'Opportunities', shortcut: 'G O', page: 'opportunities' },
                { label: 'Activities', shortcut: 'G A', page: 'activities' },
                { label: 'Calendar', shortcut: 'G V', page: 'calendar' },
                { label: 'Tasks', shortcut: 'G K', page: 'tasks' },
                { label: 'Reports', shortcut: 'G R', page: 'reports' },
                { label: 'Settings', shortcut: 'G S', page: 'settings' },
                { label: 'Add Customer', shortcut: 'N C', action: 'customer' },
                { label: 'Add Contact', shortcut: 'N T', action: 'contact' },
                { label: 'Add Lead', shortcut: 'N L', action: 'lead' },
                { label: 'Add Opportunity', shortcut: 'N O', action: 'opportunity' },
                { label: 'Add Task', shortcut: 'N K', action: 'task' },
                { label: 'Toggle Theme', shortcut: 'T T', action: 'theme' },
            ];
            const filtered = q ? commands.filter(c => c.label.toLowerCase().includes(q)) : commands;
            results.innerHTML = filtered.map(c => `
            <div class="result-item" data-page="${c.page}" data-action="${c.action}">
              <span class="icon">${c.label[0]}</span>
              ${c.label}
              <span class="shortcut">${c.shortcut}</span>
            </div>
          `).join('');
            results.querySelectorAll('.result-item').forEach(el => {
                el.addEventListener('click', function() {
                    const page = this.dataset.page;
                    const action = this.dataset.action;
                    if (page) navigate(page);
                    else if (action === 'customer') openCustomerForm();
                    else if (action === 'contact') openContactForm();
                    else if (action === 'lead') openLeadForm();
                    else if (action === 'opportunity') openOpportunityForm();
                    else if (action === 'task') openTaskForm();
                    else if (action === 'theme') toggleTheme();
                    document.getElementById('cmdPalette').classList.remove('open');
                });
            });
        });
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('cmdPalette').classList.toggle('open');
                if (document.getElementById('cmdPalette').classList.contains('open')) {
                    document.getElementById('cmdInput').focus();
                }
            }
            if (e.key === 'Escape') {
                document.getElementById('cmdPalette').classList.remove('open');
                document.getElementById('notifCenter').classList.remove('open');
                document.getElementById('profileMenu').classList.remove('open');
                document.getElementById('contextMenu').classList.remove('open');
            }
        });

        // ===== NOTIFICATIONS =====
        document.getElementById('notifBtn').addEventListener('click', function() {
            document.getElementById('notifCenter').classList.toggle('open');
            // Mark all as read
            const notifs = store.get('notifications');
            notifs.forEach(n => n.read = true);
            store.set('notifications', notifs);
            store.updateNotifDot();
            renderNotifs();
        });
        document.getElementById('notifClose').addEventListener('click', function() {
            document.getElementById('notifCenter').classList.remove('open');
        });

        function renderNotifs() {
            const list = document.getElementById('notifList');
            const notifs = store.get('notifications');
            list.innerHTML = notifs.slice(0, 20).map(n => `
            <div class="notif-item">
              <span class="notif-icon">${n.type==='success'?'✅':n.type==='error'?'❌':n.type==='warning'?'⚠️':'ℹ️'}</span>
              <div>
                <div>${n.message}</div>
                <div class="notif-time">${timeStr(n.time)}</div>
              </div>
            </div>
          `).join('') || '<div class="notif-item">No notifications</div>';
        }
        store.updateNotifDot();

        // ===== PROFILE DROPDOWN =====
        document.getElementById('profileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileMenu').classList.toggle('open');
        });
        document.addEventListener('click', function() {
            document.getElementById('profileMenu').classList.remove('open');
        });

        // ===== CONTEXT MENU =====
        document.addEventListener('contextmenu', function(e) {
            const target = e.target.closest('tr[data-id]') || e.target.closest('.pipeline-card');
            if (target) {
                e.preventDefault();
                const menu = document.getElementById('contextMenu');
                menu.classList.add('open');
                menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
                menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
                menu.dataset.targetId = target.dataset.id;
                // Determine which page we're on to handle actions
                const page = document.querySelector('.sidebar-nav .nav-item.active')?.dataset?.page || '';
                menu.dataset.page = page;
            }
        });
        document.addEventListener('click', function() {
            document.getElementById('contextMenu').classList.remove('open');
        });
        document.querySelectorAll('#contextMenu .item').forEach(item => {
            item.addEventListener('click', function() {
                const action = this.dataset.action;
                const id = document.getElementById('contextMenu').dataset.targetId;
                const page = document.getElementById('contextMenu').dataset.page;
                if (!id) return;
                if (action === 'edit') {
                    if (page === 'customers') editCustomer(id);
                    else if (page === 'contacts') editContact(id);
                    else if (page === 'leads') editLead(id);
                    else if (page === 'opportunities') editOpportunity(id);
                    else if (page === 'activities') editActivity(id);
                    else if (page === 'tasks') editTask(id);
                } else if (action === 'delete') {
                    if (page === 'customers') deleteCustomer(id);
                    else if (page === 'contacts') deleteContact(id);
                    else if (page === 'leads') deleteLead(id);
                    else if (page === 'opportunities') deleteOpportunity(id);
                    else if (page === 'activities') deleteActivity(id);
                    else if (page === 'tasks') deleteTask(id);
                } else if (action === 'duplicate') {
                    toast('Duplicated!', 'success');
                }
                document.getElementById('contextMenu').classList.remove('open');
            });
        });

        // ===== RESET DATA =====
        window.resetData = function() {
            if (!confirm('⚠️ This will erase all data and reset to sample data. Continue?')) return;
            localStorage.removeItem('crm_data');
            store.seed();
            toast('Data reset successfully', 'success');
            navigate('dashboard');
        };

        // ===== CHARTS =====
        let chartsInitialized = false;

        function initCharts() {
            if (typeof Chart === 'undefined') {
                // Chart.js not loaded yet — load from CDN
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
                script.onload = () => { setTimeout(initCharts, 200); };
                document.head.appendChild(script);
                return;
            }
            // Clean up old charts
            document.querySelectorAll('#chartPipeline, #chartStages, #chartActivity, #chartSegments, #chartIndustry, #chartSegment, #chartOppStage, #chartFunnel')
                .forEach(c => { const ctx = c.getContext('2d');
                    ctx.clearRect(0, 0, c.width, c.height); });

            const customers = store.get('customers');
            const opps = store.get('opportunities');
            const leads = store.get('leads');
            const activities = store.get('activities');
            const tasks = store.get('tasks');

            const stages = ['Discovery', 'Qualification', 'Proposal', 'Negotiation', 'Closed Won', 'Closed Lost'];
            const stageData = stages.map(s => opps.filter(o => o.stage === s).length);

            const segData = ['Enterprise', 'SMB', 'Startup', 'Government', 'Non-profit'].map(s =>
                customers.filter(c => c.segment === s).length
            );

            const actTypes = ['call', 'meeting', 'email', 'demo'];
            const actData = actTypes.map(t => activities.filter(a => a.type === t).length);

            const industryData = {};
            customers.forEach(c => { industryData[c.industry] = (industryData[c.industry] || 0) + 1; });
            const indKeys = Object.keys(industryData);
            const indVals = Object.values(industryData);

            const funnelData = [leads.length, leads.filter(l => l.status === 'contacted').length,
                leads.filter(l => l.status === 'qualified').length,
                leads.filter(l => l.status === 'converted').length
            ];

            // Pipeline chart
            const ctx1 = document.getElementById('chartPipeline');
            if (ctx1) {
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: stages,
                        datasets: [{ label: 'Deals', data: stageData, backgroundColor: ['#3b82f6', '#60a5fa',
                                '#93c5fd', '#2563eb', '#16a34a', '#dc2626'
                            ], borderRadius: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } } }
                });
            }

            // Stages pie
            const ctx2 = document.getElementById('chartStages');
            if (ctx2) {
                new Chart(ctx2, {
                    type: 'doughnut',
                    data: {
                        labels: stages,
                        datasets: [{ data: stageData, backgroundColor: ['#3b82f6', '#60a5fa', '#93c5fd',
                                '#2563eb', '#16a34a', '#dc2626'
                            ] }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'right',
                                labels: { boxWidth: 10, font: { size: 10 } } } } }
                });
            }

            // Activity chart
            const ctx3 = document.getElementById('chartActivity');
            if (ctx3) {
                new Chart(ctx3, {
                    type: 'line',
                    data: {
                        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                        datasets: [{ label: 'Activities', data: [5, 8, 12, 7, 15, 3, 2], borderColor: '#3b82f6',
                            tension: 0.3, fill: true, backgroundColor: 'rgba(59,130,246,0.1)' }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } } }
                });
            }

            // Segments chart
            const ctx4 = document.getElementById('chartSegments');
            if (ctx4) {
                new Chart(ctx4, {
                    type: 'bar',
                    data: {
                        labels: ['Enterprise', 'SMB', 'Startup', 'Government', 'Non-profit'],
                        datasets: [{ label: 'Customers', data: segData, backgroundColor: ['#7c3aed', '#8b5cf6',
                                '#a78bfa', '#6d28d9', '#5b21b6'
                            ], borderRadius: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } } }
                });
            }

            // Industry chart (reports)
            const ctx5 = document.getElementById('chartIndustry');
            if (ctx5) {
                new Chart(ctx5, {
                    type: 'bar',
                    data: { labels: indKeys.slice(0, 6), datasets: [{ label: 'Customers', data: indVals.slice(0,
                            6), backgroundColor: '#3b82f6', borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } } }
                });
            }

            // Segment chart (reports)
            const ctx6 = document.getElementById('chartSegment');
            if (ctx6) {
                new Chart(ctx6, {
                    type: 'pie',
                    data: { labels: ['Enterprise', 'SMB', 'Startup', 'Government', 'Non-profit'],
                        datasets: [{ data: segData, backgroundColor: ['#7c3aed', '#8b5cf6', '#a78bfa',
                                '#6d28d9', '#5b21b6'
                            ] }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'right',
                                labels: { boxWidth: 10, font: { size: 10 } } } } }
                });
            }

            // Opp stage chart (reports)
            const ctx7 = document.getElementById('chartOppStage');
            if (ctx7) {
                new Chart(ctx7, {
                    type: 'bar',
                    data: { labels: stages, datasets: [{ label: 'Deals', data: stageData, backgroundColor: [
                                '#3b82f6', '#60a5fa', '#93c5fd', '#2563eb', '#16a34a', '#dc2626'
                            ], borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } } }
                });
            }

            // Funnel chart
            const ctx8 = document.getElementById('chartFunnel');
            if (ctx8) {
                new Chart(ctx8, {
                    type: 'bar',
                    data: {
                        labels: ['Leads', 'Contacted', 'Qualified', 'Converted'],
                        datasets: [{ label: 'Count', data: funnelData, backgroundColor: ['#93c5fd', '#60a5fa',
                                '#3b82f6', '#16a34a'
                            ], borderRadius: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } } }
                });
            }
        }

        // ===== BIND PAGE EVENTS =====
        function bindPageEvents(page) {
            // Re-bind any dynamic events if needed
            if (page === 'customers') {
                // Already bound via onclick attributes
            }
        }

        // ===== INIT =====
        // Restore theme
        const savedTheme = store.data?.settings?.theme || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Navigate to dashboard
        navigate('dashboard');

        // Show a welcome toast
        setTimeout(() => {
            toast('Welcome to CRM+ Enterprise', 'success');
        }, 400);

        // Close modals on escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('cmdPalette').classList.remove('open');
                document.getElementById('notifCenter').classList.remove('open');
                document.getElementById('profileMenu').classList.remove('open');
                document.getElementById('contextMenu').classList.remove('open');
            }
        });

        // Keyboard shortcuts for navigation
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                const map = {
                    '1': 'dashboard',
                    '2': 'customers',
                    '3': 'contacts',
                    '4': 'leads',
                    '5': 'opportunities',
                    '6': 'activities',
                    '7': 'calendar',
                    '8': 'tasks',
                    '9': 'reports'
                };
                const page = map[e.key];
                if (page) { e.preventDefault();
                    navigate(page); }
            }
        });

        console.log('🚀 CRM+ Enterprise loaded successfully');
        console.log(`📊 ${store.get('customers').length} customers, ${store.get('leads').length} leads, ${store.get('opportunities').length} opportunities`);
    </script>

</body>
