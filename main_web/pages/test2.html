<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise CRM</title>
    <style>
        /* ===== CSS Variables & Theme ===== */
        :root {
            --bg-primary: #f6f9fc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0b1a2e;
            --bg-sidebar-hover: #1a2d44;
            --bg-topnav: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f4f8;
            --text-primary: #0b1a2e;
            --text-secondary: #4a5a6e;
            --text-muted: #8a9aa8;
            --text-light: #ffffff;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #dbeafe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --info: #0ea5e9;
            --info-light: #e0f2fe;
            --purple: #7c3aed;
            --purple-light: #ede9fe;
            --pink: #ec4899;
            --pink-light: #fce7f3;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --sidebar-width: 260px;
            --topnav-height: 64px;
            --radius: 12px;
        }

        [data-theme="dark"] {
            --bg-primary: #0a0f1a;
            --bg-secondary: #141b2b;
            --bg-sidebar: #060b14;
            --bg-sidebar-hover: #142033;
            --bg-topnav: #141b2b;
            --bg-card: #1a2335;
            --bg-input: #1f2a3f;
            --text-primary: #e8edf5;
            --text-secondary: #b0c0d4;
            --text-muted: #6a7a8e;
            --border-color: #2a3a4f;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --accent-light: #1a2d4a;
            --success-light: #0f2a1a;
            --warning-light: #2a2410;
            --danger-light: #2a1414;
            --info-light: #0a1a2a;
            --purple-light: #1a103a;
            --pink-light: #2a1020;
        }

        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 14px;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background var(--transition);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            border: none;
            background: none;
            color: inherit;
        }
        input,
        select,
        textarea {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            transition: border var(--transition), box-shadow var(--transition);
            outline: none;
            width: 100%;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ===== Scrollable container ===== */
        .scrollable {
            overflow-y: auto;
            flex: 1;
            padding: 20px 28px 40px;
            height: 100%;
        }
        .scrollable::-webkit-scrollbar {
            width: 5px;
        }
        .scrollable::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 8px;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), background var(--transition);
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            min-height: var(--topnav-height);
        }
        .sidebar-brand .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar-brand h1 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .sidebar-brand h1 span {
            color: var(--accent);
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px 12px 20px;
            overflow-y: auto;
        }
        .sidebar-nav::-webkit-scrollbar {
            width: 3px;
        }
        .sidebar-nav::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
        }
        .sidebar-nav .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.35);
            padding: 16px 12px 6px;
            font-weight: 600;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            color: rgba(255, 255, 255, 0.7);
            transition: all var(--transition);
            margin-bottom: 1px;
            cursor: pointer;
            position: relative;
            font-weight: 500;
            font-size: 13.5px;
        }
        .sidebar-nav .nav-item:hover {
            background: var(--bg-sidebar-hover);
            color: #fff;
        }
        .sidebar-nav .nav-item.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
        }
        .sidebar-nav .nav-item .icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-nav .nav-item .icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .sidebar-nav .nav-item .badge {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.15);
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }
        .sidebar-nav .nav-item.active .badge {
            background: rgba(255, 255, 255, 0.25);
        }
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-footer .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
        }
        .sidebar-footer .user-info {
            flex: 1;
            min-width: 0;
        }
        .sidebar-footer .user-info .name {
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-footer .user-info .role {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }
        .sidebar-footer .theme-toggle {
            color: rgba(255, 255, 255, 0.5);
            padding: 4px;
            border-radius: 6px;
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-footer .theme-toggle:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .sidebar-footer .theme-toggle svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* ===== Main Content ===== */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
            transition: background var(--transition);
        }

        /* ===== Top Navigation ===== */
        .topnav {
            background: var(--bg-topnav);
            padding: 0 24px;
            height: var(--topnav-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            transition: background var(--transition), border var(--transition);
            gap: 16px;
        }
        .topnav-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }
        .topnav-left .menu-toggle {
            display: none;
            padding: 6px;
            border-radius: 6px;
            color: var(--text-secondary);
            transition: all var(--transition);
            cursor: pointer;
        }
        .topnav-left .menu-toggle:hover {
            background: var(--bg-input);
        }
        .topnav-left .menu-toggle svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .topnav .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .topnav .breadcrumbs span {
            color: var(--text-primary);
            font-weight: 500;
        }
        .topnav .breadcrumbs .sep {
            color: var(--text-muted);
            margin: 0 2px;
        }
        .topnav-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .topnav-right .btn-icon {
            padding: 8px;
            border-radius: 8px;
            color: var(--text-secondary);
            transition: all var(--transition);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .topnav-right .btn-icon:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .topnav-right .btn-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .topnav-right .btn-icon .dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--bg-topnav);
        }
        .topnav-right .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 0 12px;
            gap: 8px;
            border: 1px solid transparent;
            transition: all var(--transition);
            min-width: 180px;
        }
        .topnav-right .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            background: var(--bg-secondary);
        }
        .topnav-right .search-box svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 2;
            flex-shrink: 0;
        }
        .topnav-right .search-box input {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 13px;
            width: 120px;
            transition: width var(--transition);
        }
        .topnav-right .search-box input:focus {
            width: 180px;
            box-shadow: none;
        }
        .topnav-right .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* ===== Page Content ===== */
        .page-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .page {
            display: none;
            height: 100%;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: flex;
            flex-direction: column;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Dashboard ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all var(--transition);
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .stat-card .label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
            color: var(--text-primary);
        }
        .stat-card .change {
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .stat-card .change.up {
            color: var(--success);
        }
        .stat-card .change.down {
            color: var(--danger);
        }
        .stat-card .icon-wrap {
            float: right;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-top: -4px;
        }
        .stat-card .icon-wrap.blue {
            background: var(--accent-light);
            color: var(--accent);
        }
        .stat-card .icon-wrap.green {
            background: var(--success-light);
            color: var(--success);
        }
        .stat-card .icon-wrap.yellow {
            background: var(--warning-light);
            color: var(--warning);
        }
        .stat-card .icon-wrap.red {
            background: var(--danger-light);
            color: var(--danger);
        }
        .stat-card .icon-wrap.purple {
            background: var(--purple-light);
            color: var(--purple);
        }
        .stat-card .icon-wrap.pink {
            background: var(--pink-light);
            color: var(--pink);
        }

        .chart-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-box {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        .chart-box .title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .chart-box canvas {
            width: 100% !important;
            max-height: 240px;
        }

        .recent-table-wrap {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .recent-table-wrap .title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .recent-table-wrap .title .link {
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        table th {
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            vertical-align: middle;
        }
        table tr:hover td {
            background: var(--bg-input);
        }
        table .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-badge.active {
            background: var(--success-light);
            color: var(--success);
        }
        .status-badge.inactive {
            background: var(--danger-light);
            color: var(--danger);
        }
        .status-badge.pending {
            background: var(--warning-light);
            color: var(--warning);
        }
        .status-badge.info {
            background: var(--info-light);
            color: var(--info);
        }
        .status-badge.purple {
            background: var(--purple-light);
            color: var(--purple);
        }

        /* ===== Module Common ===== */
        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .module-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .module-header .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            transition: all var(--transition);
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            color: #fff;
            border-color: var(--accent-hover);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
        .btn-success:hover {
            background: #15803d;
            color: #fff;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }
        .btn-danger:hover {
            background: #b91c1c;
            color: #fff;
        }
        .btn-warning {
            background: var(--warning);
            color: #fff;
            border-color: var(--warning);
        }
        .btn-warning:hover {
            background: #d97706;
            color: #fff;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        .btn-icon-only {
            padding: 6px 8px;
            border-radius: var(--radius-sm);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input {
            width: auto;
            min-width: 120px;
            padding: 6px 12px;
            font-size: 13px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
        }
        .filter-bar .search-input {
            flex: 1;
            min-width: 180px;
        }
        .filter-bar .search-input input {
            width: 100%;
        }

        .module-table-wrap {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .module-table-wrap .table-scroll {
            flex: 1;
            overflow: auto;
        }
        .module-table-wrap table {
            font-size: 13px;
        }
        .module-table-wrap table td .actions-cell {
            display: flex;
            gap: 4px;
        }
        .module-table-wrap table td .actions-cell button {
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-muted);
            transition: all var(--transition);
        }
        .module-table-wrap table td .actions-cell button:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .module-table-wrap .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 8px;
        }
        .module-table-wrap .pagination .info {
            color: var(--text-muted);
            font-size: 13px;
        }
        .module-table-wrap .pagination .pages {
            display: flex;
            gap: 4px;
        }
        .module-table-wrap .pagination .pages button {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all var(--transition);
            border: 1px solid transparent;
        }
        .module-table-wrap .pagination .pages button:hover {
            background: var(--bg-input);
        }
        .module-table-wrap .pagination .pages button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            max-width: 600px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
            border: 1px solid var(--border-color);
        }
        .modal.wide {
            max-width: 800px;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
        }
        .modal .modal-header .close {
            padding: 4px;
            border-radius: 6px;
            color: var(--text-muted);
            transition: all var(--transition);
        }
        .modal .modal-header .close:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .modal .modal-header .close svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .modal .form-group .required {
            color: var(--danger);
        }
        .modal .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: 100%;
        }
        .toast {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--accent);
        }
        .toast.success {
            border-left-color: var(--success);
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        .toast.warning {
            border-left-color: var(--warning);
        }
        .toast .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        .toast .toast-msg {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
        }
        .toast .toast-close {
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== Empty State ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
        }
        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-size: 18px;
        }
        .empty-state p {
            font-size: 14px;
            max-width: 400px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .chart-row {
                grid-template-columns: 1fr;
            }
            .dashboard-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-wrapper {
                margin-left: 0;
            }
            .topnav-left .menu-toggle {
                display: flex;
            }
            .topnav-right .search-box {
                min-width: auto;
            }
            .topnav-right .search-box input {
                width: 80px;
            }
            .topnav-right .search-box input:focus {
                width: 120px;
            }
            .topnav .breadcrumbs {
                font-size: 12px;
            }
            .dashboard-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .stat-card .value {
                font-size: 22px;
            }
            .modal .form-row {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 20px;
                max-width: 96%;
            }
            .module-header h2 {
                font-size: 18px;
            }
            .scrollable {
                padding: 14px 16px 30px;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar .search-input {
                min-width: auto;
            }
            .filter-bar select,
            .filter-bar input {
                min-width: auto;
                width: 100%;
            }
        }
        @media (max-width: 480px) {
            .topnav {
                padding: 0 12px;
                gap: 8px;
            }
            .topnav-right .search-box input {
                width: 60px;
            }
            .topnav-right .search-box input:focus {
                width: 100px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .stat-card {
                padding: 12px 14px;
            }
            .stat-card .value {
                font-size: 18px;
            }
            .stat-card .icon-wrap {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }

        /* ===== Misc Utilities ===== */
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: var(--text-muted);
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .flex {
            display: flex;
        }
        .flex-center {
            align-items: center;
            justify-content: center;
        }
        .gap-8 {
            gap: 8px;
        }
        .gap-12 {
            gap: 12px;
        }
        .fw-600 {
            font-weight: 600;
        }

        /* ===== Skeleton ===== */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-input) 25%, var(--border-color) 50%, var(--bg-input) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        /* ===== Context Menu ===== */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            padding: 6px 0;
            min-width: 180px;
            z-index: 4000;
            display: none;
        }
        .context-menu.open {
            display: block;
        }
        .context-menu .item {
            padding: 8px 18px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .context-menu .item:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .context-menu .item.danger {
            color: var(--danger);
        }
        .context-menu .item.danger:hover {
            background: var(--danger-light);
        }
        .context-menu .divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 12px;
        }

        /* ===== Detail View ===== */
        .detail-view {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }
        .detail-view .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-view .detail-row:last-child {
            border-bottom: none;
        }
        .detail-view .detail-label {
            font-weight: 600;
            color: var(--text-muted);
            width: 140px;
            flex-shrink: 0;
            font-size: 13px;
        }
        .detail-view .detail-value {
            flex: 1;
            color: var(--text-primary);
            font-size: 13px;
        }
        .detail-view .detail-value .tag {
            display: inline-block;
            background: var(--bg-input);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin: 2px 4px 2px 0;
        }

        /* ===== Timeline ===== */
        .timeline {
            position: relative;
            padding-left: 28px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }
        .timeline-item {
            position: relative;
            padding-bottom: 20px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg-card);
        }
        .timeline-item .time {
            font-size: 12px;
            color: var(--text-muted);
        }
        .timeline-item .content {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .timeline-item .content strong {
            color: var(--text-primary);
        }

        /* ===== Kanban / Pipeline ===== */
        .pipeline-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 8px 0 16px;
            flex: 1;
        }
        .pipeline-column {
            min-width: 220px;
            flex: 1;
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 14px 14px 10px;
            border: 1px solid var(--border-color);
            max-height: 500px;
            display: flex;
            flex-direction: column;
        }
        .pipeline-column .col-title {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .pipeline-column .col-title .count {
            background: var(--bg-card);
            padding: 0 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .pipeline-column .col-items {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pipeline-card {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            cursor: grab;
            transition: all var(--transition);
        }
        .pipeline-card:hover {
            box-shadow: var(--shadow-md);
        }
        .pipeline-card .card-title {
            font-weight: 600;
            font-size: 14px;
        }
        .pipeline-card .card-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .pipeline-card .card-value {
            font-weight: 700;
            color: var(--accent);
            font-size: 15px;
            margin-top: 4px;
        }

        /* Scrollable inner */
        .scroll-inner {
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        /* Calendar styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: var(--border-color);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .calendar-grid .cell {
            background: var(--bg-card);
            padding: 8px 6px;
            min-height: 80px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .calendar-grid .cell:hover {
            background: var(--bg-input);
        }
        .calendar-grid .cell .day-num {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .calendar-grid .cell .day-num.today {
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calendar-grid .cell .event-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin: 1px;
        }
        .calendar-grid .header-cell {
            background: var(--bg-card);
            padding: 8px 6px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            text-transform: uppercase;
        }
        .calendar-grid .cell.other-month {
            opacity: 0.4;
        }
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .calendar-nav .month-label {
            font-size: 18px;
            font-weight: 700;
        }
        .calendar-nav button {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            transition: all var(--transition);
        }
        .calendar-nav button:hover {
            background: var(--border-color);
        }

        /* ===== Command Palette ===== */
        .cmd-palette {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 540px;
            max-width: 92%;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            z-index: 5000;
            display: none;
            overflow: hidden;
            padding: 8px 0;
        }
        .cmd-palette.open {
            display: block;
            animation: slideUp 0.2s ease;
        }
        .cmd-palette input {
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            border-radius: 0;
            width: 100%;
            outline: none;
        }
        .cmd-palette input:focus {
            box-shadow: none;
            border-color: var(--border-color);
        }
        .cmd-palette .results {
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .cmd-palette .results .result-item {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all var(--transition);
            font-size: 14px;
            color: var(--text-secondary);
        }
        .cmd-palette .results .result-item:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .cmd-palette .results .result-item .icon {
            color: var(--text-muted);
        }
        .cmd-palette .results .result-item .shortcut {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 1px 10px;
            border-radius: 4px;
        }

        /* ===== Profile Dropdown ===== */
        .profile-dropdown {
            position: relative;
        }
        .profile-dropdown .dropdown-menu {
            position: absolute;
            right: 0;
            top: 44px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            min-width: 200px;
            padding: 6px 0;
            display: none;
            z-index: 100;
        }
        .profile-dropdown .dropdown-menu.open {
            display: block;
        }
        .profile-dropdown .dropdown-menu .item {
            padding: 8px 18px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-dropdown .dropdown-menu .item:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .profile-dropdown .dropdown-menu .divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 12px;
        }

        /* ===== Notification Center ===== */
        .notif-center {
            position: fixed;
            right: 20px;
            top: 76px;
            width: 360px;
            max-width: 92%;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            z-index: 1500;
            max-height: 460px;
            display: none;
            overflow: hidden;
            flex-direction: column;
        }
        .notif-center.open {
            display: flex;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .notif-center .notif-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notif-center .notif-header .close {
            cursor: pointer;
            color: var(--text-muted);
        }
        .notif-center .notif-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .notif-center .notif-item {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .notif-center .notif-item .notif-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .notif-center .notif-item .notif-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>

    <script>
        // ============================================================
        //  ENTERPRISE CRM — Full Frontend Simulation
        //  All data in LocalStorage, all CRUD, all modules.
        // ============================================================

        // ===== HELPERS =====
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        const today = () => new Date().toISOString().split('T')[0];
        const dateStr = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const timeStr = (d) => new Date(d).toLocaleTimeString('en-US', { hour: 'short', minute: '2-digit' });
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

        // ===== STORE =====
        class Store {
            constructor() {
                this.key = 'crm_data';
                this.data = this.load();
                if (!this.data || !this.data._initialized) {
                    this.seed();
                }
            }
            load() {
                try {
                    const raw = localStorage.getItem(this.key);
                    return raw ? JSON.parse(raw) : null;
                } catch { return null; }
            }
            save() {
                localStorage.setItem(this.key, JSON.stringify(this.data));
                this.updateCounts();
            }
            updateCounts() {
                document.getElementById('customerCount').textContent = this.data.customers.length;
                document.getElementById('contactCount').textContent = this.data.contacts.length;
                document.getElementById('leadCount').textContent = this.data.leads.length;
                document.getElementById('oppCount').textContent = this.data.opportunities.length;
                document.getElementById('activityCount').textContent = this.data.activities.length;
                document.getElementById('taskCount').textContent = this.data.tasks.filter(t => t.status !== 'done').length;
            }
            seed() {
                const now = new Date();
                const names = ['Acme Corp', 'Globex Inc', 'Initech', 'Hooli', 'Stark Industries', 'Wayne Enterprises',
                    'Cyberdyne', 'Umbrella Corp', 'Weyland-Yutani', 'Tyrell Corp'
                ];
                const firsts = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Henry', 'Ivy', 'Jack'];
                const lasts = ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis', 'Rodriguez',
                    'Martinez'
                ];
                const industries = ['Technology', 'Finance', 'Healthcare', 'Retail', 'Manufacturing', 'Energy', 'Education',
                    'Media'
                ];
                const segments = ['Enterprise', 'SMB', 'Startup', 'Government', 'Non-profit'];
                const statuses = ['active', 'inactive', 'pending'];
                const leadStatuses = ['new', 'contacted', 'qualified', 'unqualified', 'converted'];
                const oppStages = ['Discovery', 'Qualification', 'Proposal', 'Negotiation', 'Closed Won', 'Closed Lost'];
                const activityTypes = ['call', 'meeting', 'email', 'task', 'demo'];

                const customers = [];
                for (let i = 0; i < 25; i++) {
                    const c = {
                        id: uid(),
                        name: names[i % names.length] + (i > 9 ? ' ' + (i + 1) : ''),
                        industry: industries[i % industries.length],
                        segment: segments[i % segments.length],
                        status: statuses[i % statuses.length],
                        revenue: Math.round((Math.random() * 90 + 10) * 1000000),
                        employees: Math.round(Math.random() * 800 + 10),
                        website: `www.${names[i % names.length].toLowerCase()}.com`,
                        phone: `+1-${Math.floor(100+Math.random()*900)}-${Math.floor(100+Math.random()*900)}-${Math.floor(1000+Math.random()*9000)}`,
                        address: `${Math.floor(100+Math.random()*9000)} Main St, ${['New York','LA','Chicago','Houston','Phoenix'][i%5]}`,
                        createdAt: new Date(now.getTime() - Math.random() * 2e9).toISOString(),
                        tags: ['enterprise', 'b2b'].concat(Math.random() > 0.5 ? ['premium'] : [])
                    };
                    customers.push(c);
                }

                const contacts = [];
                for (let i = 0; i < 40; i++) {
                    const f = firsts[i % firsts.length];
                    const l = lasts[i % lasts.length];
                    contacts.push({
                        id: uid(),
                        firstName: f,
                        lastName: l,
                        email: `${f.toLowerCase()}.${l.toLowerCase()}@${customers[i%customers.length].name.replace(/\s/g,'').toLowerCase()}.com`,
                        phone: `+1-${Math.floor(100+Math.random()*900)}-${Math.floor(100+Math.random()*900)}-${Math.floor(1000+Math.random()*9000)}`,
                        jobTitle: ['CEO', 'CTO', 'VP Sales', 'Manager', 'Director', 'Analyst'][i % 6],
                        department: ['Executive', 'Sales', 'Engineering', 'Marketing', 'Operations'][i % 5],
                        customerId: customers[i % customers.length].id,
                        createdAt: new Date(now.getTime() - Math.random() * 1.5e9).toISOString(),
                        tags: ['contact'].concat(Math.random() > 0.7 ? ['decision-maker'] : [])
                    });
                }

                const leads = [];
                for (let i = 0; i < 18; i++) {
                    const f = firsts[(i + 3) % firsts.length];
                    const l = lasts[(i + 5) % lasts.length];
                    leads.push({
                        id: uid(),
                        firstName: f,
                        lastName: l,
                        email: `${f.toLowerCase()}.${l.toLowerCase()}@prospect.com`,
                        phone: `+1-${Math.floor(100+Math.random()*900)}-${Math.floor(100+Math.random()*900)}-${Math.floor(1000+Math.random()*9000)}`,
                        company: names[(i + 2) % names.length] + ' (Prospect)',
                        status: leadStatuses[i % leadStatuses.length],
                        source: ['Web', 'Referral', 'Event', 'Cold Call', 'LinkedIn'][i % 5],
                        score: Math.round(Math.random() * 100),
                        owner: 'John Doe',
                        createdAt: new Date(now.getTime() - Math.random() * 1e9).toISOString(),
                        notes: Math.random() > 0.5 ? 'Interested in enterprise plan' : ''
                    });
                }

                const opportunities = [];
                for (let i = 0; i < 16; i++) {
                    const c = customers[i % customers.length];
                    const val = Math.round((Math.random() * 48 + 2) * 10000);
                    opportunities.push({
                        id: uid(),
                        name: `${c.name} — ${['Q4 Deal','Annual Renewal','Expansion','New Implementation','Consulting'][i%5]}`,
                        customerId: c.id,
                        value: val,
                        stage: oppStages[i % oppStages.length],
                        probability: [10, 25, 40, 60, 80, 100][i % 6],
                        closeDate: new Date(now.getTime() + Math.random() * 6e7).toISOString(),
                        owner: 'John Doe',
                        createdAt: new Date(now.getTime() - Math.random() * 8e8).toISOString(),
                        competitors: Math.random() > 0.6 ? ['Competitor X', 'Competitor Y'] : []
                    });
                }

                const activities = [];
                const actTypes = ['call', 'meeting', 'email', 'demo'];
                for (let i = 0; i < 30; i++) {
                    const c = customers[i % customers.length];
                    const type = actTypes[i % actTypes.length];
                    activities.push({
                        id: uid(),
                        type: type,
                        title: `${type.charAt(0).toUpperCase()+type.slice(1)} with ${c.name}`,
                        customerId: c.id,
                        date: new Date(now.getTime() + (i - 15) * 86400000).toISOString(),
                        duration: type === 'meeting' ? 60 : type === 'call' ? 30 : 15,
                        notes: Math.random() > 0.5 ? 'Discussion about upcoming project' : '',
                        status: i % 3 === 0 ? 'completed' : 'scheduled'
                    });
                }

                const tasks = [];
                const priorities = ['low', 'medium', 'high'];
                for (let i = 0; i < 20; i++) {
                    tasks.push({
                        id: uid(),
                        title: ['Review proposal', 'Follow up with client', 'Update pipeline', 'Send quote',
                            'Prepare presentation', 'Review contract', 'Team meeting', 'Project review'
                        ][i % 8],
                        priority: priorities[i % 3],
                        status: ['todo', 'in-progress', 'done', 'todo', 'todo'][i % 5],
                        dueDate: new Date(now.getTime() + (i - 5) * 86400000).toISOString(),
                        assignedTo: 'John Doe',
                        createdAt: new Date(now.getTime() - Math.random() * 5e8).toISOString()
                    });
                }

                this.data = {
                    _initialized: true,
                    customers,
                    contacts,
                    leads,
                    opportunities,
                    activities,
                    tasks,
                    notifications: [
                        { id: uid(), type: 'info', message: 'Welcome to CRM+', time: now.toISOString() },
                        { id: uid(), type: 'success', message: '5 new leads added today', time: new Date(now.getTime() -
                                3600000).toISOString() }
                    ],
                    settings: { theme: 'light' }
                };
                this.save();
            }
            get(collection) { return this.data[collection] || []; }
            set(collection, value) { this.data[collection] = value;
                this.save(); }
            add(collection, item) {
                const arr = this.get(collection);
                arr.push(item);
                this.set(collection, arr);
                return item;
            }
            update(collection, id, updates) {
                const arr = this.get(collection);
                const idx = arr.findIndex(a => a.id === id);
                if (idx === -1) return null;
                arr[idx] = { ...arr[idx], ...updates };
                this.set(collection, arr);
                return arr[idx];
            }
            remove(collection, id) {
                const arr = this.get(collection);
                const filtered = arr.filter(a => a.id !== id);
                this.set(collection, filtered);
                return filtered;
            }
            find(collection, id) {
                return this.get(collection).find(a => a.id === id) || null;
            }
            query(collection, fn) {
                return this.get(collection).filter(fn);
            }
            getCustomerName(id) {
                const c = this.find('customers', id);
                return c ? c.name : 'Unknown';
            }
            getContactName(id) {
                const c = this.find('contacts', id);
                return c ? `${c.firstName} ${c.lastName}` : 'Unknown';
            }
            getFullName(c) { return c ? `${c.firstName} ${c.lastName}` : 'Unknown'; }
            addNotification(msg, type = 'info') {
                const n = { id: uid(), type, message: msg, time: new Date().toISOString() };
                const notifs = this.get('notifications');
                notifs.unshift(n);
                if (notifs.length > 50) notifs.pop();
                this.set('notifications', notifs);
                this.updateNotifDot();
                return n;
            }
            updateNotifDot() {
                const unread = this.get('notifications').filter(n => !n.read).length;
                document.getElementById('notifDot').style.display = unread > 0 ? 'block' : 'none';
            }
        }

        const store = new Store();

        // ===== TOAST =====
        function toast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
            el.innerHTML = `
            <span class="toast-icon">${icons[type]||'ℹ️'}</span>
            <span class="toast-msg">${msg}</span>
            <span class="toast-close">✕</span>
          `;
            container.appendChild(el);
            const close = el.querySelector('.toast-close');
            close.addEventListener('click', () => { el.remove(); });
            setTimeout(() => { el.style.opacity = '0';
                setTimeout(() => el.remove(), 300); }, 3500);
        }

        // ===== RENDER ENGINE =====
        const pages = {};

        function navigate(page, params) {
            document.querySelectorAll('.sidebar-nav .nav-item').forEach(el => el.classList.remove('active'));
            const navItem = document.querySelector(`.sidebar-nav .nav-item[data-page="${page}"]`);
            if (navItem) navItem.classList.add('active');

            const breadcrumb = document.getElementById('breadcrumbs');
            const labels = {
                dashboard: 'Dashboard',
                customers: 'Customers',
                contacts: 'Contacts',
                leads: 'Leads',
                opportunities: 'Opportunities',
                activities: 'Activities',
                calendar: 'Calendar',
                tasks: 'Tasks',
                reports: 'Reports',
                settings: 'Settings'
            };
            breadcrumb.innerHTML = `<span>${labels[page]||page}</span>`;

            const container = document.getElementById('pageContainer');
            if (pages[page]) {
                container.innerHTML = pages[page](params);
            } else {
                container.innerHTML = `<div class="empty-state"><div class="icon">🚧</div><h3>${page}</h3><p>Module in development</p></div>`;
            }
            // re-bind events after render
            bindPageEvents(page);
            if (page === 'dashboard') initCharts();
        }

        // ===== PAGE DEFINITIONS =====

        // --- Dashboard ---
        pages.dashboard = function() {
            const customers = store.get('customers');
            const leads = store.get('leads');
            const opps = store.get('opportunities');
            const tasks = store.get('tasks');
            const activities = store.get('activities');
            const activeCustomers = customers.filter(c => c.status === 'active').length;
            const totalRevenue = customers.reduce((s, c) => s + (c.revenue || 0), 0);
            const wonOpps = opps.filter(o => o.stage === 'Closed Won');
            const pipelineValue = opps.reduce((s, o) => s + (o.value || 0), 0);
            const conversionRate = leads.length > 0 ? Math.round((opps.length / leads.length) * 100) : 0;
            const churnRate = customers.length > 0 ? Math.round((customers.filter(c => c.status === 'inactive').length /
                customers.length) * 100) : 0;

            const recentActivities = activities.slice(0, 6);
            const recentOpps = opps.slice(0, 5);

            let html = `
            <div class="dashboard-grid">
              <div class="stat-card"><div class="icon-wrap blue">👥</div><div class="label">Total Customers</div><div class="value">${customers.length}</div><div class="change up">↑ 12%</div></div>
              <div class="stat-card"><div class="icon-wrap green">✅</div><div class="label">Active</div><div class="value">${activeCustomers}</div><div class="change up">↑ 8%</div></div>
              <div class="stat-card"><div class="icon-wrap yellow">🔄</div><div class="label">Leads</div><div class="value">${leads.length}</div><div class="change up">↑ 5%</div></div>
              <div class="stat-card"><div class="icon-wrap purple">💰</div><div class="label">Pipeline Value</div><div class="value">$${(pipelineValue/1e6).toFixed(1)}M</div><div class="change up">↑ 3%</div></div>
              <div class="stat-card"><div class="icon-wrap pink">🏆</div><div class="label">Won Deals</div><div class="value">${wonOpps.length}</div><div class="change up">↑ 18%</div></div>
              <div class="stat-card"><div class="icon-wrap red">📊</div><div class="label">Conversion Rate</div><div class="value">${conversionRate}%</div><div class="change ${conversionRate>30?'up':'down'}">${conversionRate>30?'↑':'↓'} ${Math.abs(conversionRate-25)}%</div></div>
              <div class="stat-card"><div class="icon-wrap blue">📈</div><div class="label">Revenue</div><div class="value">$${(totalRevenue/1e6).toFixed(1)}M</div><div class="change up">↑ 9%</div></div>
              <div class="stat-card"><div class="icon-wrap red">⚠️</div><div class="label">Churn Rate</div><div class="value">${churnRate}%</div><div class="change ${churnRate<10?'up':'down'}">${churnRate<10?'↓':'↑'} ${Math.abs(churnRate-8)}%</div></div>
            </div>

            <div class="chart-row">
              <div class="chart-box"><div class="title">📊 Revenue Pipeline</div><canvas id="chartPipeline" height="180"></canvas></div>
              <div class="chart-box"><div class="title">🎯 Deal Stages</div><canvas id="chartStages" height="180"></canvas></div>
            </div>

            <div class="chart-row">
              <div class="chart-box"><div class="title">📈 Monthly Activity</div><canvas id="chartActivity" height="180"></canvas></div>
              <div class="chart-box"><div class="title">🏷️ Customer Segments</div><canvas id="chartSegments" height="180"></canvas></div>
            </div>

            <div class="recent-table-wrap">
              <div class="title">📋 Recent Opportunities <span class="link" onclick="navigate('opportunities')">View all →</span></div>
              <div class="table-responsive">
                <table>
                  <thead><tr><th>Name</th><th>Customer</th><th>Value</th><th>Stage</th><th>Close Date</th></tr></thead>
                  <tbody>
                    ${recentOpps.map(o => `
                      <tr><td><strong>${o.name}</strong></td><td>${store.getCustomerName(o.customerId)}</td><td>$${(o.value/1000).toFixed(1)}K</td><td><span class="status-badge ${o.stage==='Closed Won'?'active':o.stage==='Closed Lost'?'inactive':'pending'}">${o.stage}</span></td><td>${dateStr(o.closeDate)}</td></tr>
                    `).join('')}
                    ${recentOpps.length===0?'<tr><td colspan="5" class="text-muted text-center">No opportunities yet</td></tr>':''}
                  </tbody>
                </table>
              </div>
            </div>

            <div class="recent-table-wrap" style="margin-top:20px;">
              <div class="title">⏱️ Recent Activities <span class="link" onclick="navigate('activities')">View all →</span></div>
              <div class="table-responsive">
                <table>
                  <thead><tr><th>Type</th><th>Title</th><th>Customer</th><th>Date</th><th>Status</th></tr></thead>
                  <tbody>
                    ${recentActivities.map(a => `
                      <tr><td>${a.type}</td><td>${a.title}</td><td>${store.getCustomerName(a.customerId)}</td><td>${dateStr(a.date)}</td><td><span class="status-badge ${a.status==='completed'?'active':'pending'}">${a.status}</span></td></tr>
                    `).join('')}
                    ${recentActivities.length===0?'<tr><td colspan="5" class="text-muted text-center">No activities</td></tr>':''}
                  </tbody>
                </table>
              </div>
            </div>
          `;
            return html;
        };

        // --- Customers ---
        pages.customers = function() {
            const customers = store.get('customers');
            let html = `
            <div class="module-header">
              <h2>👥 Customers</h2>
